<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0f0d1c">
  <title>Guru - AI Assistant with Groq & Local LLM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #0f0d1c;
      --bg-elev: #15122a;
      --surface: #1c1834;
      --border: #322b58;
      --text: #f3f1ff;
      --text-dim: #a89fd6;
      --text-faint: #6f6796;
      --violet: #8b5cf6;
      --cyan: #34e7c4;
      --red: #ff5c7a;
      --green: #10b981;
      --amber: #f59e0b;
    }

    html, body { height: 100%; margin: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: var(--bg);
    }

    /* ──── HEADER ──── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      background: var(--bg-elev);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .orb {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--violet), #5b3aa8);
      box-shadow: 0 0 16px rgba(139, 92, 246, 0.4);
      animation: breathe 3s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(0.95); opacity: 0.85; }
      50% { transform: scale(1.05); opacity: 1; }
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .brand .title {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 0.05em;
    }

    .brand .status {
      font-size: 10px;
      color: var(--text-faint);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 6px var(--cyan);
    }

    .header-buttons {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }

    .icon-btn:hover {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    /* ──── MAIN CONTENT ──── */
    main {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    .view-container {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .view-container.hidden {
      display: none;
    }

    /* ──── CHAT VIEW ──── */
    #chat-view {
      /* inherits position:absolute from .view-container */
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      display: flex;
      gap: 10px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      justify-content: flex-end;
    }

    .message-content {
      max-width: 75%;
      padding: 12px 14px;
      border-radius: 12px;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .message.user .message-content {
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.3), rgba(0, 102, 255, 0.2));
      border: 1px solid rgba(139, 92, 246, 0.5);
      color: var(--text);
    }

    .message.assistant .message-content {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
    }

    .message.system .message-content {
      background: rgba(52, 231, 196, 0.1);
      border: 1px solid rgba(52, 231, 196, 0.3);
      color: var(--cyan);
      font-size: 12px;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-faint);
      text-align: center;
      gap: 16px;
    }

    /* ──── QUICK ACTION CARDS ──── */
    .quick-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
      max-width: 320px;
      padding: 0 4px;
    }

    .qa-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 12px;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      user-select: none;
    }

    .qa-card:active {
      transform: scale(0.95);
    }

    .qa-card:hover {
      border-color: var(--violet);
      background: rgba(139, 92, 246, 0.1);
    }

    .qa-card.cyan:hover  { border-color: var(--cyan);  background: rgba(52, 231, 196, 0.08); }
    .qa-card.green:hover { border-color: var(--green); background: rgba(16, 185, 129, 0.08); }
    .qa-card.amber:hover { border-color: var(--amber); background: rgba(245, 158, 11, 0.08); }
    .qa-card.red:hover   { border-color: var(--red);   background: rgba(255, 92, 122, 0.08); }

    .qa-icon {
      font-size: 28px;
      line-height: 1;
    }

    .qa-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .qa-desc {
      font-size: 10px;
      color: var(--text-faint);
      line-height: 1.3;
    }

    /* ──── SHORTCUT STRIP ──── */
    .shortcut-strip {
      display: flex;
      gap: 6px;
      padding: 8px 12px 0;
      overflow-x: auto;
      scrollbar-width: none;
      flex-shrink: 0;
    }

    .shortcut-strip::-webkit-scrollbar { display: none; }

    .shortcut-pill {
      flex-shrink: 0;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-dim);
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .shortcut-pill:active { transform: scale(0.95); }
    .shortcut-pill:hover  { border-color: var(--cyan); color: var(--cyan); }

    /* ──── INPUT BAR ──── */
    .input-bar {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 12px;
      background: var(--bg-elev);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-wrapper {
      display: flex;
      flex: 1;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0 12px;
    }

    #chat-input {
      flex: 1;
      background: none;
      border: none;
      color: var(--text);
      padding: 10px 0;
      font-family: inherit;
      font-size: 14px;
      outline: none;
    }

    #chat-input::placeholder {
      color: var(--text-faint);
    }

    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: var(--violet);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }

    .send-btn:hover:not(:disabled) {
      box-shadow: 0 0 12px rgba(139, 92, 246, 0.4);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ──── VOICE OVERLAY ──── */
    .voice-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 13, 28, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 300;
      animation: fadeIn 0.2s ease;
    }

    .voice-ripple {
      position: relative;
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ripple-circle {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 2px solid rgba(52, 231, 196, 0.5);
      animation: ripple-wave 1.5s ease-out infinite;
    }

    @keyframes ripple-wave {
      0% { box-shadow: 0 0 0 0 rgba(52, 231, 196, 0.7); }
      100% { box-shadow: 0 0 0 20px rgba(52, 231, 196, 0); }
    }

    .voice-icon {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--cyan), #0066ff);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
      box-shadow: 0 0 20px rgba(52, 231, 196, 0.4);
    }

    .voice-text {
      color: var(--text);
      font-size: 18px;
      font-weight: 600;
      margin-top: 24px;
    }

    .voice-transcript {
      color: var(--cyan);
      font-size: 14px;
      margin-top: 12px;
      max-width: 90%;
      text-align: center;
    }

    /* ──── ADMIN PANEL ──── */
    .admin-panel {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .admin-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }

    .section-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--cyan);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .setting-row:last-child {
      border-bottom: none;
    }

    .setting-label {
      flex: 1;
    }

    .setting-label .label {
      font-weight: 500;
      color: var(--text);
      margin-bottom: 4px;
    }

    .setting-label .desc {
      font-size: 12px;
      color: var(--text-faint);
    }

    .toggle {
      width: 44px;
      height: 24px;
      border-radius: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      cursor: pointer;
      position: relative;
      transition: all 0.3s;
    }

    .toggle.on {
      background: var(--green);
      border-color: var(--green);
    }

    .toggle::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: white;
      top: 2px;
      left: 2px;
      transition: all 0.3s;
    }

    .toggle.on::after {
      left: 22px;
    }

    .select-field, .input-field {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      margin-bottom: 8px;
    }

    .select-field option {
      background: var(--bg-elev);
      color: var(--text);
    }

    .input-field:focus, .select-field:focus {
      outline: none;
      border-color: var(--cyan);
    }

    .test-btn {
      background: var(--cyan);
      border: none;
      color: var(--bg);
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      margin-top: 8px;
    }

    .test-btn:hover {
      opacity: 0.9;
    }

    .test-status {
      font-size: 12px;
      margin-top: 8px;
      padding: 6px 8px;
      border-radius: 4px;
      display: none;
    }

    .test-status.success {
      background: rgba(16, 185, 129, 0.2);
      color: var(--green);
      border: 1px solid var(--green);
      display: block;
    }

    .test-status.error {
      background: rgba(255, 92, 122, 0.2);
      color: var(--red);
      border: 1px solid var(--red);
      display: block;
    }

    .test-status.loading {
      background: rgba(245, 158, 11, 0.2);
      color: var(--amber);
      border: 1px solid var(--amber);
      display: block;
    }

    /* ──── TAB BAR ──── */
    .tab-bar {
      display: flex;
      background: var(--bg-elev);
      border-bottom: 1px solid var(--border);
      gap: 0;
      flex-shrink: 0;
    }

    .tab-btn {
      flex: 1;
      padding: 6px 4px;
      border: none;
      background: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      border-top: 2px solid transparent;
      transition: all 0.3s;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 5px;
      min-width: 0;
    }

    .tab-btn.active {
      color: var(--cyan);
      border-top-color: var(--cyan);
    }

    /* ──── SCROLLBAR ──── */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-left">
      <div class="orb"></div>
      <div class="brand">
        <div class="title">GURU</div>
        <div class="status">
          <span class="status-dot"></span>
          <span id="status-text">ready</span>
        </div>
      </div>
    </div>
    <div class="header-buttons">
      <button class="icon-btn" id="clear-chat-btn" title="Clear chat">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h16zM10 11v6M14 11v6"></path>
        </svg>
      </button>
      <button class="icon-btn" id="stop-task-btn" title="Stop automation task" style="display:none; border-color: var(--red); color: var(--red);">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <rect x="4" y="4" width="16" height="16" rx="2"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Tab Bar (top) -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="chat-view"><span style="font-size:14px">💬</span>Chat</button>
    <button class="tab-btn" data-tab="workflows-view"><span style="font-size:14px">📋</span>Flows</button>
    <button class="tab-btn" data-tab="admin-view"><span style="font-size:14px">⚙️</span>Admin</button>
  </div>

  <main>
    <!-- Chat View -->
    <div id="chat-view" class="view-container">
      <div id="messages"></div>
      <div class="shortcut-strip" id="shortcut-strip">
        <div class="shortcut-pill" onclick="setInput('What can you do?')">🤖 What can you do?</div>
        <div class="shortcut-pill" onclick="setInput('/do open the camera')">📷 Open Camera</div>
        <div class="shortcut-pill" onclick="setInput('/do take a screenshot')">🖼️ Screenshot</div>
        <div class="shortcut-pill" onclick="setInput('/do open YouTube')">▶️ YouTube</div>
        <div class="shortcut-pill" onclick="setInput('/do open Settings')">⚙️ Settings</div>
        <div class="shortcut-pill" onclick="setInput('/workflows')">📋 My Workflows</div>
      </div>
      <div class="input-bar">
        <div class="input-wrapper">
          <button id="voice-btn" class="icon-btn" title="Hold to speak">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
              <line x1="12" y1="19" x2="12" y2="23"></line>
              <line x1="8" y1="23" x2="16" y2="23"></line>
            </svg>
          </button>
          <input type="text" id="chat-input" placeholder="Type or tap mic to speak...">
          <button id="send-btn" class="send-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 2L11 13M22 2L15 22L11 13M11 13L2 9L22 2"></path>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Admin Panel -->
    <div id="admin-view" class="view-container hidden">
      <div class="admin-panel">
        <!-- LLM Provider Selection -->
        <div class="admin-section">
          <div class="section-title">🤖 AI Provider</div>
          <div style="display: flex; flex-direction: column; gap: 12px;">
            <div>
              <label style="font-size: 13px; color: var(--text-dim); display: block; margin-bottom: 6px;">Select Provider:</label>
              <select id="provider-select" class="select-field">
                <option value="groq">Groq (Free, Cloud-Based)</option>
                <option value="ollama">Local LLM (Ollama - Offline)</option>
              </select>
            </div>

            <!-- Groq Settings -->
            <div id="groq-settings">
              <label style="font-size: 13px; color: var(--text-dim); display: block; margin-bottom: 6px;">Groq API Key:</label>
              <input type="password" id="groq-key" class="input-field" placeholder="sk-...">
              <label style="font-size: 12px; color: var(--text-faint); display: block; margin-top: 8px;">
                Get free API key: <a href="https://console.groq.com" target="_blank" style="color: var(--cyan);">console.groq.com</a>
              </label>
              <select id="groq-model" class="select-field" style="margin-top: 8px;">
                <option value="llama-3.3-70b-versatile">Llama 3.3 70B (Accurate)</option>
                <option value="llama-3.1-8b-instant">Llama 3.1 8B (Fast)</option>
                <option value="openai/gpt-oss-20b">GPT-OSS 20B (Fast)</option>
                <option value="openai/gpt-oss-120b">GPT-OSS 120B (Accurate)</option>
              </select>
              <button class="test-btn" id="test-groq-btn">Test Groq Connection</button>
              <div id="groq-status" class="test-status"></div>
            </div>

            <!-- Ollama Settings -->
            <div id="ollama-settings" style="display: none;">
              <label style="font-size: 13px; color: var(--text-dim); display: block; margin-bottom: 6px;">Ollama Server URL:</label>
              <input type="text" id="ollama-url" class="input-field" placeholder="http://localhost:11434">
              <label style="font-size: 13px; color: var(--text-dim); display: block; margin-top: 8px; margin-bottom: 6px;">Model Name:</label>
              <input type="text" id="ollama-model" class="input-field" placeholder="e.g., llama2, mistral, neural-chat">
              <label style="font-size: 12px; color: var(--text-faint); display: block; margin-top: 8px;">
                ℹ️ <a href="https://ollama.ai" target="_blank" style="color: var(--cyan);">Install Ollama</a> and run: <code style="background: var(--bg); padding: 2px 4px; border-radius: 3px;">ollama run llama2</code>
              </label>
              <button class="test-btn" id="test-ollama-btn">Test Ollama Connection</button>
              <div id="ollama-status" class="test-status"></div>
            </div>
          </div>
        </div>

        <!-- Voice Settings -->
